<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>タイドグラフ - 潮汐情報</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root {
  --bg-primary: #0a1628;
  --bg-secondary: #111d33;
  --bg-card: #152238;
  --bg-hover: #1a2d4a;
  --text-primary: #e8edf5;
  --text-secondary: #8899b0;
  --accent-blue: #2d7dd2;
  --accent-cyan: #3ec6e0;
  --accent-orange: #f0943a;
  --accent-red: #e74c5e;
  --accent-green: #4ecb71;
  --high-tide: #f0943a;
  --low-tide: #3ec6e0;
  --border: #1e3050;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
  min-height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  min-width: 0;
  flex: 1;
}
.header-left .port-name {
  font-size: 16px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-left .port-area {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.header-left .chevron {
  color: var(--text-secondary);
  font-size: 12px;
  flex-shrink: 0;
}
.header-center {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.header-center .date-text {
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background .2s;
}
.header-center .date-text:active { background: var(--bg-hover); }
.nav-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: var(--bg-card);
  color: var(--text-primary);
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.nav-btn:active { background: var(--bg-hover); }
.tide-badge {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.tide-badge.oshio { background: #e74c5e33; color: #f06878; }
.tide-badge.nakashio { background: #f0943a33; color: #f0a050; }
.tide-badge.koshio { background: #3ec6e033; color: #3ec6e0; }
.tide-badge.nagashio { background: #8899b033; color: #a0b0c8; }
.tide-badge.wakashio { background: #4ecb7133; color: #4ecb71; }

/* Graph Container */
.graph-container {
  position: relative;
  width: 100%;
  padding: 0 4px;
  touch-action: pan-y;
}
.graph-container canvas {
  width: 100%;
  display: block;
}

/* Info Cards */
.info-section {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.card-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-value {
  font-size: 20px;
  font-weight: 700;
}
.card-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.card-value.high { color: var(--high-tide); }
.card-value.low { color: var(--low-tide); }
.tide-events {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 14px;
  border: 1px solid var(--border);
}
.tide-events-title {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.tide-event-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tide-event-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-secondary);
  border-radius: 8px;
  flex: 1;
  min-width: 140px;
}
.tide-event-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tide-event-dot.high { background: var(--high-tide); }
.tide-event-dot.low { background: var(--low-tide); }
.tide-event-time {
  font-size: 16px;
  font-weight: 600;
}
.tide-event-height {
  font-size: 12px;
  color: var(--text-secondary);
}
.tide-event-label {
  font-size: 11px;
  color: var(--text-secondary);
}
.sun-moon-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.moon-icon-container {
  display: flex;
  align-items: center;
  gap: 10px;
}
.moon-canvas { flex-shrink: 0; }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  display: none;
  opacity: 0;
  transition: opacity .25s;
}
.modal-overlay.active { display: flex; opacity: 1; }
.modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-primary);
  z-index: 201;
  display: none;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s ease;
}
.modal.active { display: flex; transform: translateY(0); }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding-top: calc(12px + var(--safe-top));
}
.modal-title { font-size: 17px; font-weight: 600; }
.modal-close {
  width: 32px; height: 32px;
  border: none;
  background: var(--bg-card);
  color: var(--text-primary);
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.search-box {
  padding: 10px 16px;
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 15px;
  outline: none;
}
.search-input::placeholder { color: var(--text-secondary); }
.search-input:focus { border-color: var(--accent-blue); }
.tabs {
  display: flex;
  padding: 0 16px;
  gap: 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .2s;
  flex-shrink: 0;
}
.tab.active {
  color: var(--accent-cyan);
  border-bottom-color: var(--accent-cyan);
}
.port-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom);
}
.port-group-header {
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  position: sticky;
  top: 0;
  z-index: 1;
}
.port-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.port-item:active { background: var(--bg-hover); }
.port-item .port-item-name { font-size: 15px; }
.port-item .port-item-area {
  font-size: 12px;
  color: var(--text-secondary);
}
.fav-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.fav-btn.active { color: #f0c040; }

/* Date picker */
.date-picker-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5);
  z-index: 150;
  display: none;
  align-items: center;
  justify-content: center;
}
.date-picker-overlay.active { display: flex; }
.date-picker {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  min-width: 280px;
}
.date-picker input[type="date"] {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 16px;
}
.date-picker-btns {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.date-picker-btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}
.date-picker-btn.cancel { background: var(--bg-secondary); color: var(--text-primary); }
.date-picker-btn.today { background: var(--accent-blue); color: #fff; }

/* Disclaimer Modal */
.disclaimer-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.7);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.disclaimer-overlay.active { display: flex; }
.disclaimer-box {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 24px;
  border: 1px solid var(--border);
  max-width: 340px;
  width: 100%;
  text-align: center;
}
.disclaimer-icon { font-size: 28px; margin-bottom: 8px; }
.disclaimer-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.disclaimer-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; text-align: left; margin-bottom: 18px; }
.disclaimer-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: var(--accent-blue);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

/* Footer disclaimer */
.footer-disclaimer {
  font-size: 10px;
  color: var(--text-secondary);
  text-align: center;
  padding: 8px 16px 4px;
  opacity: .7;
}

/* Countdown */
.next-tide-card {
  background: linear-gradient(135deg, var(--bg-card), #1a2d4a);
  border-radius: 12px;
  padding: 14px;
  border: 1px solid var(--border);
}
.next-tide-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.next-tide-info {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.next-tide-name {
  font-size: 14px;
  font-weight: 600;
}
.next-tide-countdown {
  font-size: 22px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.next-tide-detail {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

@media (max-width: 374px) {
  .header { padding: 8px 10px; }
  .header-left .port-name { font-size: 14px; }
  .card-value { font-size: 18px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left" id="openPortSelect">
    <div>
      <div class="port-name" id="portName">串本漁港</div>
      <div class="port-area" id="portArea">和歌山県 串本町</div>
    </div>
    <span class="chevron">&#9662;</span>
  </div>
  <div class="header-center">
    <button class="nav-btn" id="prevDay">&#8249;</button>
    <span class="date-text" id="dateText">2月28日(金)</span>
    <button class="nav-btn" id="nextDay">&#8250;</button>
  </div>
  <span class="tide-badge" id="tideBadge">大潮</span>
</div>

<!-- Graph -->
<div class="graph-container" id="graphContainer">
  <canvas id="tideCanvas"></canvas>
</div>

<!-- Info -->
<div class="info-section">
  <!-- Next tide countdown -->
  <div class="next-tide-card" id="nextTideCard">
    <div class="next-tide-label">次の潮汐</div>
    <div class="next-tide-info">
      <span class="next-tide-name" id="nextTideName">満潮</span>
      <span class="next-tide-countdown" id="nextTideCountdown">--:--:--</span>
    </div>
    <div class="next-tide-detail" id="nextTideDetail"></div>
  </div>

  <!-- Tide events -->
  <div class="tide-events">
    <div class="tide-events-title">満潮・干潮</div>
    <div class="tide-event-list" id="tideEventList"></div>
  </div>

  <!-- Sun / Moon row -->
  <div class="sun-moon-row">
    <div class="card">
      <div class="card-label">&#9728;&#65039; 日の出・日の入り</div>
      <div class="card-value" id="sunriseText" style="font-size:16px;">--:--</div>
      <div class="card-sub" id="sunsetText">日の入り --:--</div>
    </div>
    <div class="card">
      <div class="card-label">&#127769; 月齢</div>
      <div class="moon-icon-container">
        <canvas class="moon-canvas" id="moonCanvas" width="36" height="36"></canvas>
        <div>
          <div class="card-value" id="moonAgeText" style="font-size:16px;">--</div>
          <div class="card-sub" id="moonPhaseText"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="footer-disclaimer">&#9888; 本アプリの情報は釣り可否を保証するものではありません。現地の看板・各漁協にご確認ください。</div>
</div>

<!-- Disclaimer Modal -->
<div class="disclaimer-overlay" id="disclaimerOverlay">
  <div class="disclaimer-box">
    <div class="disclaimer-icon">&#9888;&#65039;</div>
    <div class="disclaimer-title">ご利用にあたって</div>
    <div class="disclaimer-text">
      釣り禁止・立入禁止区域は現地の看板・各漁協にご確認ください。<br><br>
      本アプリの情報は釣り可否を保証するものではありません。<br><br>
      マナーを守り安全に釣りをお楽しみください。
    </div>
    <button class="disclaimer-btn" id="disclaimerOk">了解しました</button>
  </div>
</div>

<!-- Port Selection Modal -->
<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal" id="portModal">
  <div class="modal-header">
    <span class="modal-title">地点を選択</span>
    <button class="modal-close" id="closeModal">&#10005;</button>
  </div>
  <div class="search-box">
    <input class="search-input" id="searchInput" type="text" placeholder="漁港名で検索..." autocomplete="off">
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="fav">&#9733; お気に入り</div>
    <div class="tab" data-tab="wakayama">和歌山</div>
    <div class="tab" data-tab="osaka">大阪</div>
    <div class="tab" data-tab="kyoto">京都</div>
  </div>
  <div class="port-list" id="portList"></div>
</div>

<!-- Date Picker -->
<div class="date-picker-overlay" id="datePickerOverlay">
  <div class="date-picker">
    <input type="date" id="datePickerInput">
    <div class="date-picker-btns">
      <button class="date-picker-btn cancel" id="datePickerCancel">キャンセル</button>
      <button class="date-picker-btn today" id="datePickerToday">今日</button>
    </div>
  </div>
</div>

// M2, S2, K1, O1, N2, SA, K2, P1

// All fishing ports
// Format: [name, area, prefecture, lat, lon, refPort1, refPort2(optional), weight(0-1, for interpolation)]
const PORTS = [
  // ==================== WAKAYAMA ====================
  // --- 和歌山市 ---
  ["田ノ浦漁港","和歌山市","wakayama",34.1920,135.1360,"wakayama",null,1],

// ==================== TIDAL CALCULATION ====================
const DEG = Math.PI / 180;

// Astronomical angular speeds (degrees per hour)
const SPEEDS = {
  M2: 28.9841042,
  S2: 30.0000000,
  K1: 15.0410686,
  O1: 13.9430356,
  N2: 28.4397295,
  SA: 0.0410686,
  K2: 30.0821373,
  P1: 14.9589314
};

// Node factors and equilibrium arguments - simplified for practical use
function getAstronomicalArgs(date) {
  const Y = date.getFullYear();
  const M = date.getMonth() + 1;
  const D = date.getDate();
  // Julian centuries from J2000.0
  const JD = 367*Y - Math.floor(7*(Y+Math.floor((M+9)/12))/4) + Math.floor(275*M/9) + D + 1721013.5;
  const T = (JD - 2451545.0) / 36525.0;

  // Mean lunar longitude
  const s = 218.3165 + 481267.8813 * T;
  // Mean solar longitude
  const h = 280.4661 + 36000.7698 * T;
  // Mean lunar perigee longitude
  const p = 83.3532 + 4069.0137 * T;
  // Mean lunar node longitude
  const N = 125.0445 - 1934.1363 * T;

  return { s: s % 360, h: h % 360, p: p % 360, N: N % 360, T };
}

function getEquilibriumArgs(astro) {
  const { s, h, p, N } = astro;
  return {
    M2: 2*h - 2*s,
    S2: 0,
    K1: h + 90,
    O1: h - 2*s - 90,
    N2: 2*h - 3*s + p,
    SA: h,
    K2: 2*h,
    P1: -h + 270
  };
}

function getNodeFactors(astro) {
  const Nr = astro.N * DEG;
  const cosN = Math.cos(Nr);
  const cos2N = Math.cos(2 * Nr);
  return {
    M2: 1.0 - 0.037 * cosN,
    S2: 1.0,
    K1: 1.006 + 0.115 * cosN,
    O1: 1.009 + 0.187 * cosN,
    N2: 1.0 - 0.037 * cosN,
    SA: 1.0,
    K2: 1.024 + 0.286 * cosN,
    P1: 1.0
  };
}

function getNodePhaseCorrections(astro) {
  const Nr = astro.N * DEG;
  const sinN = Math.sin(Nr);
  return {
    M2: -2.1 * sinN,
    S2: 0,
    K1: -8.9 * sinN,
    O1: 10.8 * sinN,
    N2: -2.1 * sinN,
    SA: 0,
    K2: -17.7 * sinN,
    P1: 0
  };
}

function getHarmonicsForPort(portIndex) {
  const port = PORTS[portIndex];
  const ref1Name = port[5];
  const ref2Name = port[6];
  const weight = port[7];
  const ref1 = REF_PORTS[ref1Name];
  if (!ref2Name) return ref1;
  const ref2 = REF_PORTS[ref2Name];
  // Interpolate
  const result = { lat: port[3], lon: port[4] };
  const constituents = ['M2','S2','K1','O1','N2','SA','K2','P1'];
  for (const c of constituents) {
    const a1 = ref1[c][0], p1 = ref1[c][1];
    const a2 = ref2[c][0], p2 = ref2[c][1];
    const w = weight;
    result[c] = [
      a1 * w + a2 * (1 - w),
      p1 * w + p2 * (1 - w)
    ];
  }
  return result;
}

// Calculate tide height at a given Date
function calcTideHeight(harmonics, date, astro, nodeF, nodeU, eqArgs) {
  const startOfDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const hours = (date - startOfDay) / 3600000;
  const constituents = ['M2','S2','K1','O1','N2','SA','K2','P1'];
  let h = 100; // mean sea level offset in cm
  for (const c of constituents) {
    if (!harmonics[c]) continue;
    const A = harmonics[c][0];
    const phi = harmonics[c][1];
    const f = nodeF[c];
    const u = nodeU[c];
    const V0 = eqArgs[c];
    const omega = SPEEDS[c];
    h += f * A * Math.cos((omega * hours + V0 + u - phi) * DEG);
  }
  return h;
}

// Calculate a full day of tide data (144 points, every 10 min)
function calcDayTide(portIndex, date) {
  const harmonics = getHarmonicsForPort(portIndex);
  const astro = getAstronomicalArgs(date);
  const nodeF = getNodeFactors(astro);
  const nodeU = getNodePhaseCorrections(astro);
  const eqArgs = getEquilibriumArgs(astro);

  const startOfDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const points = [];
  for (let i = 0; i <= 144; i++) {
    const t = new Date(startOfDay.getTime() + i * 10 * 60000);
    const h = calcTideHeight(harmonics, t, astro, nodeF, nodeU, eqArgs);
    points.push({ time: t, height: h, minutes: i * 10 });
  }
  return points;
}

// Find high/low tide events
function findTideEvents(points) {
  const events = [];
  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i-1].height;
    const curr = points[i].height;
    const next = points[i+1].height;
    if (curr > prev && curr > next) {
      events.push({ type: 'high', time: points[i].time, height: Math.round(curr), minutes: points[i].minutes });
    } else if (curr < prev && curr < next) {
      events.push({ type: 'low', time: points[i].time, height: Math.round(curr), minutes: points[i].minutes });
    }
  }
  return events;
}

// ==================== SUN CALCULATION ====================
function calcSunTimes(lat, lon, date) {
  const rad = Math.PI / 180;
  const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  const lnHour = lon / 15;

  function calcSun(rising) {
    const t = dayOfYear + ((rising ? 6 : 18) - lnHour) / 24;
    const M = 0.9856 * t - 3.289;
    let L = M + 1.916 * Math.sin(M * rad) + 0.020 * Math.sin(2 * M * rad) + 282.634;
    L = ((L % 360) + 360) % 360;
    let RA = Math.atan2(Math.sin(L * rad) * 0.91764, Math.cos(L * rad)) / rad;
    RA = ((RA % 360) + 360) % 360;
    const Lq = Math.floor(L / 90) * 90;
    const RAq = Math.floor(RA / 90) * 90;
    RA = (RA + Lq - RAq) / 15;
    const sinDec = 0.39782 * Math.sin(L * rad);
    const cosDec = Math.cos(Math.asin(sinDec));
    const cosH = (-0.01454 - sinDec * Math.sin(lat * rad)) / (cosDec * Math.cos(lat * rad));
    if (cosH > 1 || cosH < -1) return null;
    let H = Math.acos(cosH) / rad;
    if (rising) H = 360 - H;
    H /= 15;
    const T = H + RA - 0.06571 * t - 6.622;
    let UT = ((T - lnHour) % 24 + 24) % 24;
    // Convert to JST (UTC+9)
    UT += 9;
    if (UT >= 24) UT -= 24;
    return UT;
  }

  const sunrise = calcSun(true);
  const sunset = calcSun(false);
  return {
    sunrise: sunrise != null ? sunrise : null,
    sunset: sunset != null ? sunset : null
  };
}

function hoursToHHMM(h) {
  if (h == null) return '--:--';
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// ==================== MOON CALCULATION ====================
function calcMoonAge(date) {
  // Simplified moon age calculation
  const Y = date.getFullYear();
  const M = date.getMonth() + 1;
  const D = date.getDate();
  // Based on the known new moon: Jan 6, 2000 was a new moon (roughly)
  const JD = 367*Y - Math.floor(7*(Y+Math.floor((M+9)/12))/4) + Math.floor(275*M/9) + D + 1721013.5;
  const newMoonRef = 2451550.1; // Jan 6, 2000 new moon
  const synodicMonth = 29.53059;
  let age = ((JD - newMoonRef) % synodicMonth + synodicMonth) % synodicMonth;
  return age;
}

function getTideName(moonAge) {
  const a = Math.floor(moonAge);
  if ((a >= 0 && a <= 2) || (a >= 14 && a <= 17)) return '大潮';
  if ((a >= 3 && a <= 6) || (a >= 11 && a <= 13) || (a >= 18 && a <= 21) || (a >= 25 && a <= 27)) return '中潮';
  if ((a >= 7 && a <= 8) || (a >= 22 && a <= 23)) return '小潮';
  if (a === 9 || a === 24) return '長潮';
  if (a === 10 || a === 25) return '若潮';
  return '中潮';
}

function getTideBadgeClass(name) {
  switch(name) {
    case '大潮': return 'oshio';
    case '中潮': return 'nakashio';
    case '小潮': return 'koshio';
    case '長潮': return 'nagashio';
    case '若潮': return 'wakashio';
    default: return 'nakashio';
  }
}

function getMoonPhaseName(moonAge) {
  if (moonAge < 1.85) return '新月';
  if (moonAge < 7.38) return '三日月';
  if (moonAge < 9.23) return '上弦';
  if (moonAge < 14.77) return '十三夜';
  if (moonAge < 16.61) return '満月';
  if (moonAge < 22.15) return '居待月';
  if (moonAge < 24.00) return '下弦';
  return '晦日月';
}

function drawMoon(canvas, moonAge) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const r = Math.min(w, h) / 2 - 2;
  const cx = w / 2, cy = h / 2;
  ctx.clearRect(0, 0, w, h);

  // Background circle (dark side)
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#1a2540';
  ctx.fill();
  ctx.strokeStyle = '#2a3a5a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Illuminated portion
  const phase = (moonAge / 29.53059) * Math.PI * 2;
  ctx.beginPath();
  // Right half or left half lit depending on phase
  if (phase < Math.PI) {
    // Waxing: right side lit
    ctx.arc(cx, cy, r, -Math.PI/2, Math.PI/2, false);
    const k = Math.cos(phase);
    ctx.ellipse(cx, cy, Math.abs(k) * r, r, 0, Math.PI/2, -Math.PI/2, k < 0);
  } else {
    // Waning: left side lit
    ctx.arc(cx, cy, r, Math.PI/2, -Math.PI/2, false);
    const k = Math.cos(phase);
    ctx.ellipse(cx, cy, Math.abs(k) * r, r, 0, -Math.PI/2, Math.PI/2, k > 0);
  }
  ctx.closePath();
  ctx.fillStyle = '#e8dcc0';
  ctx.fill();
}

// ==================== GRAPH DRAWING ====================
function drawTideGraph(canvas, points, events, sunTimes, currentDate, isToday) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width;
  const H = Math.min(W * 0.55, 320);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = { top: 20, right: 12, bottom: 30, left: 40 };
  const gW = W - pad.left - pad.right;
  const gH = H - pad.top - pad.bottom;

  // Find data range
  let minH = Infinity, maxH = -Infinity;
  for (const p of points) {
    if (p.height < minH) minH = p.height;
    if (p.height > maxH) maxH = p.height;
  }
  const range = maxH - minH;
  const dataMin = minH - range * 0.15;
  const dataMax = maxH + range * 0.15;

  function xPos(minutes) { return pad.left + (minutes / 1440) * gW; }
  function yPos(h) { return pad.top + gH - ((h - dataMin) / (dataMax - dataMin)) * gH; }

  // Background
  ctx.fillStyle = '#0c1a2e';
  ctx.fillRect(0, 0, W, H);

  // Day/night background
  if (sunTimes.sunrise != null && sunTimes.sunset != null) {
    const srMin = sunTimes.sunrise * 60;
    const ssMin = sunTimes.sunset * 60;
    // Night (before sunrise)
    ctx.fillStyle = 'rgba(5,12,30,0.6)';
    ctx.fillRect(pad.left, pad.top, xPos(srMin) - pad.left, gH);
    // Day
    const dayGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + gH);
    dayGrad.addColorStop(0, 'rgba(30,60,100,0.3)');
    dayGrad.addColorStop(1, 'rgba(15,30,60,0.15)');
    ctx.fillStyle = dayGrad;
    ctx.fillRect(xPos(srMin), pad.top, xPos(ssMin) - xPos(srMin), gH);
    // Night (after sunset)
    ctx.fillStyle = 'rgba(5,12,30,0.6)';
    ctx.fillRect(xPos(ssMin), pad.top, W - pad.right - xPos(ssMin), gH);

    // Sunrise/sunset lines
    ctx.setLineDash([4, 3]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#f0943a55';
    ctx.beginPath();
    ctx.moveTo(xPos(srMin), pad.top);
    ctx.lineTo(xPos(srMin), pad.top + gH);
    ctx.stroke();
    ctx.strokeStyle = '#e74c5e55';
    ctx.beginPath();
    ctx.moveTo(xPos(ssMin), pad.top);
    ctx.lineTo(xPos(ssMin), pad.top + gH);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid lines - vertical (hours)
  ctx.strokeStyle = '#1a2d4a';
  ctx.lineWidth = 0.5;
  for (let h = 0; h <= 24; h += 3) {
    const x = xPos(h * 60);
    ctx.beginPath();
    ctx.moveTo(x, pad.top);
    ctx.lineTo(x, pad.top + gH);
    ctx.stroke();
  }

  // Grid lines - horizontal
  const step = Math.max(10, Math.round(range / 4 / 10) * 10) || 20;
  const startY = Math.ceil(dataMin / step) * step;
  ctx.strokeStyle = '#1a2d4a';
  ctx.fillStyle = '#5a7090';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  for (let v = startY; v <= dataMax; v += step) {
    const y = yPos(v);
    if (y < pad.top || y > pad.top + gH) continue;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    ctx.fillText(Math.round(v) + '', pad.left - 4, y + 3);
  }

  // X-axis labels
  ctx.fillStyle = '#5a7090';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  for (let h = 0; h <= 24; h += 3) {
    ctx.fillText(h + '', xPos(h * 60), H - pad.bottom + 16);
  }

  // Tide curve - gradient fill
  ctx.beginPath();
  ctx.moveTo(xPos(points[0].minutes), yPos(points[0].height));
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(xPos(points[i].minutes), yPos(points[i].height));
  }
  ctx.lineTo(xPos(points[points.length-1].minutes), pad.top + gH);
  ctx.lineTo(xPos(points[0].minutes), pad.top + gH);
  ctx.closePath();
  const fillGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + gH);
  fillGrad.addColorStop(0, 'rgba(45,125,210,0.35)');
  fillGrad.addColorStop(1, 'rgba(45,125,210,0.05)');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  // Tide curve - line
  ctx.beginPath();
  ctx.moveTo(xPos(points[0].minutes), yPos(points[0].height));
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(xPos(points[i].minutes), yPos(points[i].height));
  }
  ctx.strokeStyle = '#3ec6e0';
  ctx.lineWidth = 2;
  ctx.stroke();

  // High/Low markers
  for (const ev of events) {
    const x = xPos(ev.minutes);
    const y = yPos(ev.height);
    const color = ev.type === 'high' ? '#f0943a' : '#3ec6e0';

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#0c1a2e';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    const timeStr = ev.time.getHours().toString().padStart(2,'0') + ':' + ev.time.getMinutes().toString().padStart(2,'0');
    const labelText = timeStr + ' (' + ev.height + 'cm)';
    ctx.font = 'bold 10px -apple-system, sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    const labelY = ev.type === 'high' ? y - 10 : y + 15;
    ctx.fillText(labelText, Math.max(pad.left + 30, Math.min(W - pad.right - 30, x)), labelY);
  }

  // Current time marker (only if viewing today)
  if (isToday) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const nx = xPos(nowMin);
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = '#e74c5e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(nx, pad.top);
    ctx.lineTo(nx, pad.top + gH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Current tide height dot
    const idx = Math.min(Math.floor(nowMin / 10), points.length - 2);
    const frac = (nowMin - idx * 10) / 10;
    const currentH = points[idx].height + (points[idx+1].height - points[idx].height) * frac;
    const ny = yPos(currentH);
    ctx.beginPath();
    ctx.arc(nx, ny, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#e74c5e';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Y-axis label
  ctx.save();
  ctx.fillStyle = '#5a7090';
  ctx.font = '9px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.translate(10, pad.top + gH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('潮位 (cm)', 0, 0);
  ctx.restore();
}

// ==================== APP STATE ====================
let state = {
  portIndex: 76, // 串本漁港 default
  date: new Date(),
  favorites: [],
  activeTab: 'fav'
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('tidegraph_state');
    if (saved) {
      const s = JSON.parse(saved);
      if (typeof s.portIndex === 'number') state.portIndex = s.portIndex;
      if (Array.isArray(s.favorites)) state.favorites = s.favorites;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('tidegraph_state', JSON.stringify({
      portIndex: state.portIndex,
      favorites: state.favorites
    }));
  } catch(e) {}
}

// ==================== UI UPDATE ====================
const dayNames = ['日','月','火','水','木','金','土'];

function formatDate(d) {
  return `${d.getMonth()+1}月${d.getDate()}日(${dayNames[d.getDay()]})`;
}

function isToday(d) {
  const today = new Date();
  return d.getFullYear() === today.getFullYear() &&
         d.getMonth() === today.getMonth() &&
         d.getDate() === today.getDate();
}

function updateUI() {
  const port = PORTS[state.portIndex];
  const d = state.date;
  const td = isToday(d);

  // Header
  document.getElementById('portName').textContent = port[0];
  document.getElementById('portArea').textContent =
    (port[2] === 'wakayama' ? '和歌山県' : port[2] === 'osaka' ? '大阪府' : '京都府') + ' ' + port[1];
  document.getElementById('dateText').textContent = formatDate(d);

  // Moon / tide name
  const moonAge = calcMoonAge(d);
  const tideName = getTideName(moonAge);
  const badge = document.getElementById('tideBadge');
  badge.textContent = tideName;
  badge.className = 'tide-badge ' + getTideBadgeClass(tideName);

  // Calculate tides
  const points = calcDayTide(state.portIndex, d);
  const events = findTideEvents(points);

  // Sun
  const sunTimes = calcSunTimes(port[3], port[4], d);

  // Draw graph
  const canvas = document.getElementById('tideCanvas');
  drawTideGraph(canvas, points, events, sunTimes, d, td);

  // Tide events list
  const eventList = document.getElementById('tideEventList');
  eventList.innerHTML = '';
  for (const ev of events) {
    const timeStr = ev.time.getHours().toString().padStart(2,'0') + ':' + ev.time.getMinutes().toString().padStart(2,'0');
    const typeName = ev.type === 'high' ? '満潮' : '干潮';
    const item = document.createElement('div');
    item.className = 'tide-event-item';
    item.innerHTML = `
      <span class="tide-event-dot ${ev.type}"></span>
      <div>
        <div class="tide-event-label">${typeName}</div>
        <div class="tide-event-time">${timeStr}</div>
        <div class="tide-event-height">${ev.height} cm</div>
      </div>
    `;
    eventList.appendChild(item);
  }

  // Next tide countdown
  updateNextTide(events, td);

  // Sun display
  document.getElementById('sunriseText').textContent = '日の出 ' + hoursToHHMM(sunTimes.sunrise);
  document.getElementById('sunsetText').textContent = '日の入り ' + hoursToHHMM(sunTimes.sunset);

  // Moon
  document.getElementById('moonAgeText').textContent = moonAge.toFixed(1);
  document.getElementById('moonPhaseText').textContent = getMoonPhaseName(moonAge);
  drawMoon(document.getElementById('moonCanvas'), moonAge);
}

function updateNextTide(events, td) {
  const card = document.getElementById('nextTideCard');
  const nameEl = document.getElementById('nextTideName');
  const countEl = document.getElementById('nextTideCountdown');
  const detailEl = document.getElementById('nextTideDetail');

  if (!td || events.length === 0) {
    nameEl.textContent = '--';
    countEl.textContent = '--:--:--';
    detailEl.textContent = td ? '' : '当日のみ表示';
    return;
  }

  const now = new Date();
  let nextEvent = null;
  for (const ev of events) {
    if (ev.time > now) { nextEvent = ev; break; }
  }
  if (!nextEvent) {
    nameEl.textContent = '--';
    countEl.textContent = '本日終了';
    detailEl.textContent = '';
    return;
  }

  const typeName = nextEvent.type === 'high' ? '満潮' : '干潮';
  const timeStr = nextEvent.time.getHours().toString().padStart(2,'0') + ':' + nextEvent.time.getMinutes().toString().padStart(2,'0');
  nameEl.textContent = typeName;
  nameEl.style.color = nextEvent.type === 'high' ? 'var(--high-tide)' : 'var(--low-tide)';

  const diff = nextEvent.time - now;
  const hh = Math.floor(diff / 3600000);
  const mm = Math.floor((diff % 3600000) / 60000);
  const ss = Math.floor((diff % 60000) / 1000);
  countEl.textContent = `${hh}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  detailEl.textContent = `${timeStr} (${nextEvent.height}cm)`;
}

// ==================== PORT SELECTION MODAL ====================
function openPortModal() {
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('portModal').classList.add('active');
  document.getElementById('searchInput').value = '';
  renderPortList();
}

function closePortModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('portModal').classList.remove('active');
}

function renderPortList() {
  const list = document.getElementById('portList');
  const searchText = document.getElementById('searchInput').value.trim();
  const tab = state.activeTab;
  list.innerHTML = '';

  let filtered = [];
  if (searchText) {
    // Search across all ports
    PORTS.forEach((p, i) => {
      if (p[0].includes(searchText) || p[1].includes(searchText)) {
        filtered.push(i);
      }
    });
  } else if (tab === 'fav') {
    filtered = state.favorites.filter(i => i >= 0 && i < PORTS.length);
    if (filtered.length === 0) {
      list.innerHTML = '<div style="padding:40px 16px;text-align:center;color:var(--text-secondary);font-size:14px;">お気に入りがありません<br><span style="font-size:12px;">漁港の★をタップして追加</span></div>';
      return;
    }
  } else {
    const prefMap = { wakayama: 'wakayama', osaka: 'osaka', kyoto: 'kyoto' };
    PORTS.forEach((p, i) => {
      if (p[2] === prefMap[tab]) filtered.push(i);
    });
  }

  // Group by area (for wakayama)
  if (tab === 'wakayama' && !searchText) {
    const groups = {};
    for (const i of filtered) {
      const area = PORTS[i][1];
      if (!groups[area]) groups[area] = [];
      groups[area].push(i);
    }
    for (const [area, indices] of Object.entries(groups)) {
      const header = document.createElement('div');
      header.className = 'port-group-header';
      header.textContent = area;
      list.appendChild(header);
      for (const i of indices) {
        list.appendChild(createPortItem(i));
      }
    }
  } else {
    for (const i of filtered) {
      list.appendChild(createPortItem(i));
    }
  }
}

function createPortItem(portIndex) {
  const port = PORTS[portIndex];
  const isFav = state.favorites.includes(portIndex);
  const item = document.createElement('div');
  item.className = 'port-item';
  item.innerHTML = `
    <div>
      <div class="port-item-name">${port[0]}</div>
      <div class="port-item-area">${port[2]==='wakayama'?'和歌山県':port[2]==='osaka'?'大阪府':'京都府'} ${port[1]}</div>
    </div>
    <button class="fav-btn ${isFav ? 'active' : ''}" data-idx="${portIndex}">&#9733;</button>
  `;
  item.querySelector('.port-item-name').parentElement.addEventListener('click', () => {
    state.portIndex = portIndex;
    saveState();
    closePortModal();
    updateUI();
  });
  item.querySelector('.fav-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleFavorite(portIndex);
    renderPortList();
  });
  return item;
}

function toggleFavorite(portIndex) {
  const idx = state.favorites.indexOf(portIndex);
  if (idx >= 0) {
    state.favorites.splice(idx, 1);
  } else {
    state.favorites.push(portIndex);
  }
  saveState();
}

// ==================== SWIPE ====================
let touchStartX = 0;
let touchStartY = 0;
function handleSwipe(e) {
  if (e.type === 'touchstart') {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  } else if (e.type === 'touchend') {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) changeDay(1);
      else changeDay(-1);
    }
  }
}

function changeDay(delta) {
  state.date = new Date(state.date.getTime() + delta * 86400000);
  updateUI();
}

  document.getElementById('searchInput').addEventListener('input', renderPortList);

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.activeTab = tab.dataset.tab;
      renderPortList();
    });
  });

  // Date picker
  document.getElementById('datePickerCancel').addEventListener('click', closeDatePicker);
  document.getElementById('datePickerToday').addEventListener('click', () => {
    state.date = new Date();
    closeDatePicker();
    updateUI();
  });
  document.getElementById('datePickerInput').addEventListener('change', (e) => {
    const parts = e.target.value.split('-');
    if (parts.length === 3) {
      state.date = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
      closeDatePicker();
      updateUI();
    }
  });
  document.getElementById('datePickerOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeDatePicker();
  });

  // Swipe
  const graphContainer = document.getElementById('graphContainer');
  graphContainer.addEventListener('touchstart', handleSwipe, { passive: true });
  graphContainer.addEventListener('touchend', handleSwipe, { passive: true });

  // Resize
  window.addEventListener('resize', updateUI);

  // Update countdown every second
  setInterval(() => {
    if (isToday(state.date)) {
      const points = calcDayTide(state.portIndex, state.date);
      const events = findTideEvents(points);
      updateNextTide(events, true);
    }
  }, 1000);

  // Redraw graph every minute (for current time marker)
  setInterval(() => {
    if (isToday(state.date)) updateUI();
  }, 60000);

  updateUI();
}

// Register service worker and force update
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then((reg) => {
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') location.reload();
      });
    });
  }).catch(() => {});
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
